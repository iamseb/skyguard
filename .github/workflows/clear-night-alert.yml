name: SkyGuard — Clear Night Alert

on:
  schedule:
    # 06:00 UTC = 08:00 local (CEST). Adjust the hour to taste; cron is UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print the message instead of sending a push"
        type: boolean
        default: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          # Location lives in Secrets (encrypted, not publicly visible) rather
          # than Variables, so coordinates are never exposed on a public repo.
          LATITUDE: ${{ secrets.LATITUDE }}
          LONGITUDE: ${{ secrets.LONGITUDE }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
